name: OmniRDP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.8/LLVM-20.1.8-win64.exe"
          $out = "$env:TEMP\LLVM-20.1.8-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList "/S" -Wait
          Write-Output "clang-format installed"

      - name: Check formatting
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\LLVM\bin;$env:PATH"
          Get-ChildItem -Path "OmniRDP/src", "OmniRDP/include" -Recurse -Include "*.c", "*.h" | ForEach-Object {
            & clang-format --dry-run --Werror $_.FullName 2>&1 | ForEach-Object { Write-Output "$($_.FullName): $_" }
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

  windows-build-test:
    name: Windows build and test
    runs-on: windows-2022
    timeout-minutes: 45
    if: success()
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Remove partial FreeRDP tree
        run: rm -rf freerdp-3.26.0

      - name: Checkout FreeRDP 3.26.0
        uses: actions/checkout@v5
        with:
          repository: FreeRDP/FreeRDP
          ref: 3.26.0
          path: freerdp-3.26.0
          fetch-depth: 1

      - name: Apply FreeRDP patch
        shell: pwsh
        run: |
          git -C freerdp-3.26.0 apply --check "$env:GITHUB_WORKSPACE/patches/freerdp/0001-winpr-skip-legacy-provider-when-internal-md4.patch"
          git -C freerdp-3.26.0 apply "$env:GITHUB_WORKSPACE/patches/freerdp/0001-winpr-skip-legacy-provider-when-internal-md4.patch"

      - name: Checkout vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1
          ref: "2024.12.16"

      - name: Bootstrap vcpkg
        shell: pwsh
        working-directory: vcpkg
        run: .\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v5
        with:
          path: vcpkg/installed
          key: windows-vcpkg-v2-${{ hashFiles('.github/workflows/ci.yml', 'patches/freerdp/*.patch') }}
          restore-keys: |
            windows-vcpkg-v2-

      - name: Install Windows dependencies via vcpkg
        shell: pwsh
        working-directory: vcpkg
        run: |
          .\vcpkg install `
            openssl:x64-windows `
            libjpeg-turbo:x64-windows `
            libpng:x64-windows `
            zlib:x64-windows `
            libusb:x64-windows

      - name: Configure FreeRDP Debug
        run: |
          cmake -S freerdp-3.26.0 -B freerdp-3.26.0/build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_INTERNAL_MD4=ON \
            -DWITH_INTERNAL_MD5=ON \
            -DWITH_INTERNAL_RC4=ON \
            -DWITH_NATIVE_SSPI=ON \
            -DWITH_AAD=OFF \
            -DWITH_KRB5=OFF \
            -DWITH_SERVER=ON \
            -DWITH_SHADOW=OFF \
            -DWITH_PROXY=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DWITH_X11=OFF \
            -DWITH_WAYLAND=OFF \
            -DWITH_SDL2=OFF \
            -DWITH_CAIRO=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_SWSCALE=OFF \
            -DWITH_MEDIA_FOUNDATION=OFF \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build FreeRDP Debug
        run: cmake --build freerdp-3.26.0/build-debug --config Debug -j

      - name: Configure OmniRDP Debug
        run: |
          cmake -S OmniRDP -B OmniRDP/build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DFREERDP_BUILD="$GITHUB_WORKSPACE/freerdp-3.26.0/build-debug" \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build OmniRDP Debug
        run: cmake --build OmniRDP/build-debug --config Debug -j

      - name: Configure OmniRDP ASan
        run: |
          cmake -S OmniRDP -B OmniRDP/build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUSE_ADDRESS_SANITIZER=ON \
            -DFREERDP_BUILD="$GITHUB_WORKSPACE/freerdp-3.26.0/build-debug" \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build OmniRDP ASan
        run: cmake --build OmniRDP/build-asan --config Debug -j

      - name: Run tests under ASan
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -property installationPath
          $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan_dynamic-x86_64.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asanDll) { $env:PATH = "$($asanDll.DirectoryName);$env:PATH" }
          $env:ASAN_OPTIONS = "halt_on_error=1:detect_stack_use_after_return=1:check_initialization_order=1"
          $testDir = "OmniRDP/build-asan/tests"
          $testBinDir = "$testDir/Debug"
          foreach ($testName in @("test_viewer_state", "test_pointer_shape")) {
            $exe = Join-Path $testBinDir "$testName.exe"
            if (Test-Path $exe) { & $exe }
          }

      - name: Configure FreeRDP Release
        run: |
          cmake -S freerdp-3.26.0 -B freerdp-3.26.0/build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_INTERNAL_MD4=ON \
            -DWITH_INTERNAL_MD5=ON \
            -DWITH_INTERNAL_RC4=ON \
            -DWITH_NATIVE_SSPI=ON \
            -DWITH_AAD=OFF \
            -DWITH_KRB5=OFF \
            -DWITH_SERVER=ON \
            -DWITH_SHADOW=OFF \
            -DWITH_PROXY=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DWITH_X11=OFF \
            -DWITH_WAYLAND=OFF \
            -DWITH_SDL2=OFF \
            -DWITH_CAIRO=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_SWSCALE=OFF \
            -DWITH_MEDIA_FOUNDATION=OFF \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build FreeRDP Release
        run: cmake --build freerdp-3.26.0/build-release --config Release -j

      - name: Configure OmniRDP Release
        run: |
          cmake -S OmniRDP -B OmniRDP/build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DFREERDP_BUILD="$GITHUB_WORKSPACE/freerdp-3.26.0/build-release" \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -G "Visual Studio 17 2022" \
            -A x64

      - name: Build OmniRDP Release
        run: cmake --build OmniRDP/build-release --config Release -j

      - name: Stage Windows artifacts if build succeeds
        if: success()
        run: |
          mkdir -p artifacts/windows-Release/bin
          for exe in OmniRDP.exe OmniRDP-svc.exe OmniRDP-tray.exe; do
            find OmniRDP/build-release -name "$exe" -type f -exec cp {} artifacts/windows-Release/bin/ \; 2>/dev/null || true
          done
          for dll in freerdp3.dll freerdp-client3.dll freerdp-server3.dll winpr3.dll libcrypto-3-x64.dll libssl-3-x64.dll libusb-1.0.dll zlib1.dll; do
            find freerdp-3.26.0/build-release -name "$dll" -type f -exec cp {} artifacts/windows-Release/bin/ \; 2>/dev/null || true
          done

      - name: Upload Windows artifacts if build succeeds
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: windows-OmniRDP
          path: artifacts/windows-Release/
          retention-days: 7
          if-no-files-found: error

  build-installer:
    name: Build Inno Setup Installer
    runs-on: windows-2022
    needs: windows-build-test
    if: success()
    steps:
      - uses: actions/checkout@v5

      - name: Download Release artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-OmniRDP
          path: artifacts/windows-Release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: iscc setup/OmniRDP.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-OmniRDP-Setup
          path: setup/Output/OmniRDP-Setup.exe
          retention-days: 7
          if-no-files-found: error



